name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: check
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            digimon-tamagotchi-frontend/package-lock.json

      - name: Show runtime versions
        run: |
          node -v
          npm -v
          node -e 'if (!process.version.startsWith("v24.")) process.exit(1)'

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install frontend dependencies
        working-directory: digimon-tamagotchi-frontend
        run: npm ci --no-audit --no-fund

      - name: Run all checks
        run: npm run check

      - name: Verify no tracked files were generated
        run: |
          git diff --check
          git diff --exit-code
